<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Live Trades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .trade-enter {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <h1 class="text-3xl font-bold mb-2">Polymarket Live Trades</h1>
        <p class="text-gray-400 mb-6">Monitor real-time trades on multiple Polymarket events</p>

        <!-- Connection Status -->
        <div class="bg-gray-800 rounded-lg p-4 mb-6">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-gray-500"></div>
                    <span id="status" class="text-gray-400">Not connected</span>
                </div>
                <button onclick="toggleConnection()" id="connectBtn"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded font-medium transition-colors">
                    Connect
                </button>
            </div>

            <!-- Add Event Form -->
            <div id="addEventSection" class="hidden">
                <div class="flex flex-col md:flex-row gap-2">
                    <input type="text" id="eventSlug"
                           placeholder="Enter event slug (e.g., nba-lal-por-2026-01-17)"
                           class="flex-1 px-4 py-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 text-white placeholder-gray-400">
                    <button onclick="subscribeEvent()"
                            class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded font-medium transition-colors">
                        Add Event
                    </button>
                </div>
            </div>
        </div>

        <!-- Active Subscriptions -->
        <div id="subscriptionsSection" class="bg-gray-800 rounded-lg p-4 mb-6 hidden">
            <h2 class="font-semibold mb-3">Active Subscriptions</h2>
            <div id="subscriptionsList" class="space-y-2">
                <!-- Subscriptions will be added here -->
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-gray-800 rounded-lg p-4 text-center">
                <div id="tradeCount" class="text-2xl font-bold text-blue-400">0</div>
                <div class="text-gray-400 text-sm">Total Trades</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 text-center">
                <div id="buyCount" class="text-2xl font-bold text-green-400">0</div>
                <div class="text-gray-400 text-sm">Buys</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 text-center">
                <div id="sellCount" class="text-2xl font-bold text-red-400">0</div>
                <div class="text-gray-400 text-sm">Sells</div>
            </div>
        </div>

        <!-- Trade Feed -->
        <div class="bg-gray-800 rounded-lg overflow-hidden">
            <div class="px-4 py-3 border-b border-gray-700 flex justify-between items-center">
                <h2 class="font-semibold">Live Trade Feed</h2>
                <button onclick="clearTrades()" class="text-sm text-gray-400 hover:text-white transition-colors">
                    Clear
                </button>
            </div>
            <div id="trades" class="divide-y divide-gray-700 max-h-[600px] overflow-y-auto">
                <div id="noTrades" class="p-8 text-center text-gray-500">
                    No trades yet. Connect and add events to start monitoring.
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-6 text-center text-gray-500 text-sm">
            Powered by Polymarket RTDS WebSocket
        </div>
    </div>

    <script>
        let ws = null;
        let tradeCount = 0;
        let buyCount = 0;
        let sellCount = 0;
        let subscriptions = new Map(); // eventSlug -> title

        function toggleConnection() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            setStatus('connecting', 'Connecting...');

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                setStatus('connected', 'Connected');
                document.getElementById('connectBtn').textContent = 'Disconnect';
                document.getElementById('connectBtn').classList.remove('bg-blue-600', 'hover:bg-blue-700');
                document.getElementById('connectBtn').classList.add('bg-red-600', 'hover:bg-red-700');
                document.getElementById('addEventSection').classList.remove('hidden');

                // Request list of subscriptions (in case of reconnect)
                ws.send(JSON.stringify({ action: 'list' }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };

            ws.onclose = () => {
                setStatus('disconnected', 'Disconnected');
                document.getElementById('connectBtn').textContent = 'Connect';
                document.getElementById('connectBtn').classList.remove('bg-red-600', 'hover:bg-red-700');
                document.getElementById('connectBtn').classList.add('bg-blue-600', 'hover:bg-blue-700');
                document.getElementById('addEventSection').classList.add('hidden');
                subscriptions.clear();
                updateSubscriptionsList();
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                setStatus('error', 'Connection error');
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'subscribed':
                    subscriptions.set(data.event, data.title || data.event);
                    updateSubscriptionsList();
                    showNotification(`Subscribed to ${data.title || data.event}`, 'success');
                    break;

                case 'unsubscribed':
                    subscriptions.delete(data.event);
                    updateSubscriptionsList();
                    showNotification(`Unsubscribed from ${data.event}`, 'info');
                    break;

                case 'subscriptions':
                    // Update subscriptions list from server
                    if (data.events) {
                        data.events.forEach(event => {
                            if (!subscriptions.has(event)) {
                                subscriptions.set(event, event);
                            }
                        });
                    }
                    updateSubscriptionsList();
                    break;

                case 'error':
                    showNotification(data.message, 'error');
                    break;

                default:
                    // Assume it's a trade
                    if (data.trader && data.side) {
                        addTrade(data);
                    }
            }
        }

        function subscribeEvent() {
            const input = document.getElementById('eventSlug');
            const eventSlug = input.value.trim();

            if (!eventSlug) {
                showNotification('Please enter an event slug', 'error');
                return;
            }

            if (subscriptions.has(eventSlug)) {
                showNotification('Already subscribed to this event', 'error');
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'subscribe', event: eventSlug }));
                input.value = '';
            }
        }

        function unsubscribeEvent(eventSlug) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'unsubscribe', event: eventSlug }));
            }
        }

        function updateSubscriptionsList() {
            const section = document.getElementById('subscriptionsSection');
            const list = document.getElementById('subscriptionsList');

            if (subscriptions.size === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            list.innerHTML = '';

            subscriptions.forEach((title, slug) => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between bg-gray-700 rounded px-3 py-2';
                item.innerHTML = `
                    <div>
                        <span class="font-medium">${title}</span>
                        <span class="text-gray-400 text-sm ml-2">${slug}</span>
                    </div>
                    <button onclick="unsubscribeEvent('${slug}')"
                            class="text-red-400 hover:text-red-300 text-sm">
                        Remove
                    </button>
                `;
                list.appendChild(item);
            });

            // Update status with subscription count
            setStatus('connected', `Connected (${subscriptions.size} event${subscriptions.size !== 1 ? 's' : ''})`);
        }

        function showNotification(message, type) {
            // Simple notification - could be enhanced with a proper notification library
            console.log(`[${type}] ${message}`);
        }

        function setStatus(state, text) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('status');

            statusText.textContent = text;

            switch (state) {
                case 'connected':
                    statusDot.className = 'w-3 h-3 rounded-full bg-green-500';
                    statusText.className = 'text-green-400';
                    break;
                case 'connecting':
                    statusDot.className = 'w-3 h-3 rounded-full bg-yellow-500 animate-pulse';
                    statusText.className = 'text-yellow-400';
                    break;
                case 'disconnected':
                    statusDot.className = 'w-3 h-3 rounded-full bg-gray-500';
                    statusText.className = 'text-gray-400';
                    break;
                case 'error':
                    statusDot.className = 'w-3 h-3 rounded-full bg-red-500';
                    statusText.className = 'text-red-400';
                    break;
            }
        }

        function addTrade(trade) {
            const tradesDiv = document.getElementById('trades');
            const noTrades = document.getElementById('noTrades');

            if (noTrades) {
                noTrades.style.display = 'none';
            }

            const tradeEl = document.createElement('div');

            const isBuy = trade.side === 'BUY';
            const sideColor = isBuy ? 'text-green-400' : 'text-red-400';
            const sideBg = isBuy ? 'bg-green-900/20' : 'bg-red-900/20';

            const time = trade.timestamp ? new Date(trade.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
            const shortEvent = trade.eventSlug ? trade.eventSlug.substring(0, 15) : '';

            tradeEl.innerHTML = `
                <div class="flex items-center justify-between ${sideBg} px-4 py-3">
                    <div class="flex items-center gap-3">
                        <span class="text-gray-500 text-sm w-20">${time}</span>
                        <span class="text-purple-400 text-xs font-mono bg-purple-900/30 px-2 py-0.5 rounded">${shortEvent}</span>
                        <span class="text-yellow-400 font-medium truncate max-w-[120px]" title="${trade.proxyWallet}">${trade.trader}</span>
                        <span class="${sideColor} font-bold w-12">${trade.side}</span>
                        <span class="text-white w-16">${trade.outcome}</span>
                    </div>
                    <div class="flex items-center gap-4 text-right">
                        <span class="text-blue-400 font-medium">$${trade.size}</span>
                        <span class="text-gray-400">@</span>
                        <span class="text-purple-400 font-medium">$${trade.price}</span>
                    </div>
                </div>
            `;
            tradeEl.className = 'trade-enter';

            // Prepend new trades at top
            tradesDiv.insertBefore(tradeEl, tradesDiv.firstChild);

            // Update counts
            tradeCount++;
            if (isBuy) buyCount++;
            else sellCount++;

            document.getElementById('tradeCount').textContent = tradeCount;
            document.getElementById('buyCount').textContent = buyCount;
            document.getElementById('sellCount').textContent = sellCount;

            // Limit to 200 trades
            while (tradesDiv.children.length > 200) {
                tradesDiv.removeChild(tradesDiv.lastChild);
            }
        }

        function clearTrades() {
            const tradesDiv = document.getElementById('trades');
            tradesDiv.innerHTML = '<div id="noTrades" class="p-8 text-center text-gray-500" style="display: none;">No trades yet. Connect and add events to start monitoring.</div>';

            if (subscriptions.size > 0) {
                document.getElementById('noTrades').style.display = 'none';
            } else {
                document.getElementById('noTrades').style.display = 'block';
            }

            tradeCount = 0;
            buyCount = 0;
            sellCount = 0;
            document.getElementById('tradeCount').textContent = '0';
            document.getElementById('buyCount').textContent = '0';
            document.getElementById('sellCount').textContent = '0';
        }

        // Handle Enter key in input
        document.getElementById('eventSlug').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                subscribeEvent();
            }
        });
    </script>
</body>
</html>
