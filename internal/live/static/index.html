<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Live Trades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .trade-enter {
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .event-panel {
            min-height: 400px;
            max-height: 600px;
        }
        .trade-list {
            max-height: 350px;
            overflow-y: auto;
        }
        .trade-list::-webkit-scrollbar {
            width: 6px;
        }
        .trade-list::-webkit-scrollbar-track {
            background: #1f2937;
        }
        .trade-list::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
        .live-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .score-box {
            background: linear-gradient(135deg, #1e3a5f 0%, #1a1a2e 100%);
        }
        .score-flash {
            animation: scoreFlash 0.6s ease-out;
        }
        @keyframes scoreFlash {
            0% { transform: scale(1); color: white; }
            30% { transform: scale(1.3); color: #fbbf24; text-shadow: 0 0 20px #fbbf24; }
            100% { transform: scale(1); color: white; text-shadow: none; }
        }
        .score-delta {
            position: absolute;
            top: -8px;
            right: -20px;
            font-size: 12px;
            font-weight: bold;
            color: #4ade80;
            animation: deltaFade 1.5s ease-out forwards;
        }
        @keyframes deltaFade {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">Polymarket Live Trades</h1>
                <p class="text-gray-400 text-sm">Pro Trader View - Multi-Event Monitoring</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-gray-500"></div>
                    <span id="status" class="text-gray-400 text-sm">Not connected</span>
                </div>
                <div class="flex items-center gap-2">
                    <div id="sportsStatusDot" class="w-2.5 h-2.5 rounded-full bg-gray-500"></div>
                    <span id="sportsStatus" class="text-gray-400 text-sm">Sports: Off</span>
                </div>
                <button onclick="toggleConnection()" id="connectBtn"
                        class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 rounded text-sm font-medium transition-colors">
                    Connect
                </button>
            </div>
        </div>

        <!-- Add Event Bar -->
        <div id="addEventSection" class="hidden mb-6">
            <div class="flex gap-2 items-center">
                <input type="text" id="eventSlug"
                       placeholder="Enter event slug (e.g., nba-lal-por-2026-01-17)"
                       class="flex-1 px-4 py-2 rounded bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 text-sm">
                <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
                    <input type="checkbox" id="allMarketsToggle" class="w-4 h-4 rounded bg-gray-700 border-gray-600">
                    <span>All Markets</span>
                </label>
                <button onclick="subscribeEvent()"
                        class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded text-sm font-medium transition-colors">
                    Add Event
                </button>
            </div>
        </div>

        <!-- Event Panels Grid -->
        <div id="eventPanels" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
            <!-- Placeholder when no events -->
            <div id="noEventsPlaceholder" class="col-span-full bg-gray-800 rounded-lg p-12 text-center">
                <div class="text-gray-500 text-lg mb-2">No events subscribed</div>
                <div class="text-gray-600 text-sm">Connect and add events to start monitoring trades</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-6 text-center text-gray-600 text-xs">
            Powered by Polymarket RTDS & Sports WebSocket
        </div>
    </div>

    <script>
        // Trade WebSocket
        let ws = null;
        let subscriptions = new Map(); // eventSlug -> { title, trades: [], buys: 0, sells: 0, allMarkets: bool }
        let reconnectTimer = null;
        let manualDisconnect = false;
        const RECONNECT_DELAY = 3000;
        const STORAGE_KEY = 'polymarket_live_subscriptions';

        // Sports WebSocket
        let sportsWs = null;
        let sportsReconnectTimer = null;
        let sportsReconnectDelay = 1000; // Start with 1 second, exponential backoff
        let gameStates = new Map(); // gameId -> game data
        let eventToGameId = new Map(); // eventSlug -> gameId
        let eventGameData = new Map(); // eventSlug -> { homeTeam, awayTeam } - full names
        let previousScores = new Map(); // eventSlug -> { home: string, away: string }

        // US leagues use away-home format in slug
        const US_LEAGUES = ['nba', 'nfl', 'mlb', 'nhl', 'ncaab', 'ncaaf', 'wnba'];

        // Load saved subscriptions from localStorage
        function loadSavedSubscriptions() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    return JSON.parse(saved);
                }
            } catch (e) {
                console.error('Failed to load saved subscriptions:', e);
            }
            return [];
        }

        // Save subscriptions to localStorage
        function saveSubscriptions() {
            try {
                const toSave = [];
                subscriptions.forEach((data, slug) => {
                    toSave.push({ slug, allMarkets: data.allMarkets || false });
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
            } catch (e) {
                console.error('Failed to save subscriptions:', e);
            }
        }

        // Re-subscribe to all saved events
        function resubscribeAll() {
            const saved = loadSavedSubscriptions();
            saved.forEach(({ slug, allMarkets }) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    console.log('Re-subscribing to:', slug);
                    ws.send(JSON.stringify({ action: 'subscribe', event: slug, allMarkets: allMarkets }));
                }
            });
        }

        // ==================== Sports WebSocket ====================

        function connectSportsWs() {
            if (sportsWs && sportsWs.readyState === WebSocket.OPEN) return;

            // Clear any existing reconnect timer
            if (sportsReconnectTimer) {
                clearTimeout(sportsReconnectTimer);
                sportsReconnectTimer = null;
            }

            console.log('Connecting to Sports WebSocket...');
            setSportsStatus('connecting', 'Sports: Connecting...');

            sportsWs = new WebSocket('wss://sports-api.polymarket.com/ws');

            sportsWs.onopen = () => {
                console.log('Sports WebSocket connected');
                setSportsStatus('connected', 'Sports: Live');
                // Reset reconnect delay on successful connection
                sportsReconnectDelay = 1000;
            };

            sportsWs.onmessage = (event) => {
                // CRITICAL: Handle ping/pong first (lowercase!)
                // Server sends 'ping' every 5 seconds, must respond with 'pong' within 10 seconds
                if (event.data === 'ping') {
                    if (sportsWs && sportsWs.readyState === WebSocket.OPEN) {
                        sportsWs.send('pong');
                    }
                    return;
                }

                // Try to parse JSON for game data
                try {
                    const data = JSON.parse(event.data);
                    handleSportsMessage(data);
                } catch (e) {
                    // Ignore non-JSON messages
                    console.log('Sports WS non-JSON message:', event.data);
                }
            };

            sportsWs.onclose = (e) => {
                console.log('Sports WebSocket disconnected:', e.code, e.reason);
                setSportsStatus('disconnected', 'Sports: Off');

                // Auto-reconnect with exponential backoff (max 30 seconds)
                sportsReconnectTimer = setTimeout(() => {
                    connectSportsWs();
                }, sportsReconnectDelay);
                sportsReconnectDelay = Math.min(sportsReconnectDelay * 2, 30000);
            };

            sportsWs.onerror = (err) => {
                console.error('Sports WebSocket error:', err);
                setSportsStatus('error', 'Sports: Error');
            };
        }

        function disconnectSportsWs() {
            if (sportsReconnectTimer) {
                clearTimeout(sportsReconnectTimer);
                sportsReconnectTimer = null;
            }
            if (sportsWs) {
                sportsWs.close();
                sportsWs = null;
            }
        }

        function handleSportsMessage(data) {
            // Sports WebSocket sends game state updates
            if (!data.gameId) return;

            const gameId = data.gameId;
            gameStates.set(gameId, data);

            // Try to match this game to subscribed events
            subscriptions.forEach((eventData, slug) => {
                if (matchEventToGame(slug, data)) {
                    eventToGameId.set(slug, gameId);

                    // Prefer full team names from title, fallback to Sports WS data
                    const titleTeams = getTeamsFromTitle(slug, eventData.title);
                    if (titleTeams) {
                        eventGameData.set(slug, {
                            homeTeam: titleTeams.home,
                            awayTeam: titleTeams.away
                        });
                    } else {
                        // Fallback to Sports WS data (might be abbreviations)
                        eventGameData.set(slug, {
                            homeTeam: data.homeTeam,
                            awayTeam: data.awayTeam
                        });
                    }
                    updateGameStateUI(slug, data);
                }
            });
        }

        function matchEventToGame(eventSlug, gameData) {
            // Get subscription data for title-based matching
            const subData = subscriptions.get(eventSlug);
            const eventTitle = subData?.title || '';

            const gameHome = gameData.homeTeam || '';
            const gameAway = gameData.awayTeam || '';
            const gameLeague = (gameData.leagueAbbreviation || '').toLowerCase();

            // Method 1: Match by title (most reliable)
            // Check if event title contains both team names from Sports WS
            if (eventTitle && gameHome && gameAway) {
                const titleNorm = normalizeText(eventTitle.toUpperCase());
                const homeNorm = normalizeText(gameHome.toUpperCase());
                const awayNorm = normalizeText(gameAway.toUpperCase());

                const homeMatch = titleNorm.includes(homeNorm);
                const awayMatch = titleNorm.includes(awayNorm);

                // Debug logging
                console.log(`[Match] Slug: ${eventSlug}`);
                console.log(`[Match] Title: "${eventTitle}" → "${titleNorm}"`);
                console.log(`[Match] Home: "${gameHome}" → "${homeNorm}" → ${homeMatch}`);
                console.log(`[Match] Away: "${gameAway}" → "${awayNorm}" → ${awayMatch}`);

                // Also log title parsing
                const parsedTeams = parseTeamsFromTitle(eventTitle);
                console.log(`[Match] Parsed from title:`, parsedTeams);

                if (homeMatch && awayMatch) {
                    console.log(`[Match] ✓ MATCHED!`);
                    return true;
                }
            }

            // Method 2: Fallback to slug-based matching
            const parts = eventSlug.toLowerCase().split('-');
            if (parts.length < 4) return false;

            const league = parts[0];
            const team1 = parts[1].toUpperCase();
            const team2 = parts[2].toUpperCase();

            // League must match for slug-based matching
            if (league !== gameLeague) return false;

            // US sports: slug format is away-home
            if (US_LEAGUES.includes(league)) {
                const awayMatch = fuzzyTeamMatch(team1, gameAway.toUpperCase());
                const homeMatch = fuzzyTeamMatch(team2, gameHome.toUpperCase());
                console.log(`[Match] Slug fallback: ${team1} vs ${gameAway.toUpperCase()} = ${awayMatch}, ${team2} vs ${gameHome.toUpperCase()} = ${homeMatch}`);
                return awayMatch && homeMatch;
            }

            // Football/Soccer/Esports: slug format is home-away
            return fuzzyTeamMatch(team1, gameHome.toUpperCase()) && fuzzyTeamMatch(team2, gameAway.toUpperCase());
        }

        // Normalize special characters for matching (ø→o, ü→u, é→e, etc.)
        function normalizeText(text) {
            return text
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '') // Remove diacritics
                .replace(/ø/gi, 'o')
                .replace(/æ/gi, 'ae')
                .replace(/ß/g, 'ss')
                .replace(/[\/\-_\.]/g, ' ')      // Replace separators with space
                .replace(/[^a-zA-Z0-9\s]/g, '')  // Remove other special chars
                .replace(/\s+/g, ' ')            // Collapse multiple spaces
                .trim();
        }

        // Fuzzy match team abbreviation to full team name
        // e.g., "NOLOGO" matches "NOLOGOJUSTMMR", "LYNX" matches "TEAM LYNX"
        // e.g., "SPIRIT1" matches "SPIRIT ACADEMY" (trailing numbers stripped)
        // e.g., "RE" matches "RUNE EATERS" (initials)
        // e.g., "BOG" matches "FK Bodø/Glimt" (normalized ø→o)
        function fuzzyTeamMatch(slugTeam, gameTeam) {
            if (!slugTeam || !gameTeam) return false;

            // Normalize both teams for comparison
            const slugNorm = normalizeText(slugTeam);
            const gameNorm = normalizeText(gameTeam);

            // Strip trailing numbers from slug team (e.g., "SPIRIT1" -> "SPIRIT")
            const slugTeamClean = slugNorm.replace(/\d+$/, '');

            // Try matching with both original and cleaned slug team
            const candidates = [slugNorm];
            if (slugTeamClean !== slugNorm && slugTeamClean.length > 0) {
                candidates.push(slugTeamClean);
            }

            const gameTeamNoSpaces = gameNorm.replace(/\s+/g, '');
            const words = gameNorm.split(/\s+/).filter(w => w.length > 0);

            for (const candidate of candidates) {
                // Exact match
                if (candidate === gameNorm) return true;

                // Slug team is contained in game team (handles "LYNX" in "TEAM LYNX")
                if (gameNorm.includes(candidate)) return true;

                // Game team starts with slug team (handles "NOLOGO" -> "NOLOGOJUSTMMR")
                if (gameNorm.startsWith(candidate)) return true;

                // Remove spaces and check (handles "SPIRIT" in "SPIRITACADEMY")
                if (gameTeamNoSpaces.includes(candidate)) return true;

                // Check if any word in game team starts with slug team
                for (const word of words) {
                    if (word.startsWith(candidate)) return true;
                }

                // Check if slug is initials of game team words
                // "RE" matches "Rune Eaters" (R + E)
                if (words.length >= 2 && candidate.length >= 2) {
                    const initials = words.map(w => w[0]).join('');
                    if (initials === candidate) return true;
                    // Also check first N letters match initials
                    if (initials.startsWith(candidate) || candidate.startsWith(initials)) return true;
                }

                // Check if slug chars appear as subsequence across all words
                // "MNC" matches "MaNChester CITY" (M...N...C in order)
                if (candidate.length >= 2) {
                    if (isSubsequence(candidate, gameTeamNoSpaces)) {
                        return true;
                    }
                }

                // For short abbreviations (3-4 chars), match if first 2 chars are same
                // This handles PHX vs PHO (both Phoenix), LAL vs LAK, etc.
                if (candidate.length <= 4 && gameNorm.length <= 4) {
                    if (candidate.substring(0, 2) === gameNorm.substring(0, 2)) {
                        return true;
                    }
                }
            }

            return false;
        }

        // Check if 'sub' appears as subsequence in 'str'
        // e.g., "MNC" in "MANCHESTER" → M(a)N(chester)C(ity)... wait that's across words
        // Better: check if chars appear in order
        function isSubsequence(sub, str) {
            let subIdx = 0;
            for (let i = 0; i < str.length && subIdx < sub.length; i++) {
                if (str[i] === sub[subIdx]) {
                    subIdx++;
                }
            }
            return subIdx === sub.length;
        }

        function setSportsStatus(state, text) {
            const statusDot = document.getElementById('sportsStatusDot');
            const statusText = document.getElementById('sportsStatus');
            statusText.textContent = text;

            const colors = {
                connected: 'bg-green-500',
                connecting: 'bg-yellow-500 animate-pulse',
                disconnected: 'bg-gray-500',
                error: 'bg-red-500'
            };

            statusDot.className = `w-2.5 h-2.5 rounded-full ${colors[state]}`;
        }

        function updateGameStateUI(eventSlug, gameData) {
            const gamePanel = document.getElementById(`game-${eventSlug}`);
            if (!gamePanel) return;

            const isLive = gameData.live && !gameData.ended;
            const score = gameData.score || '0-0';
            const [homeScore, awayScore] = parseScore(score, eventSlug);
            const period = gameData.period || '';
            const elapsed = gameData.elapsed || '';
            const possession = gameData.turn || '';

            // Determine if US league for display order
            const parts = eventSlug.toLowerCase().split('-');
            const league = parts[0] || '';
            const isUSLeague = US_LEAGUES.includes(league);

            // For display: US leagues show Away-Home, others show Home-Away
            const leftScore = isUSLeague ? awayScore : homeScore;
            const rightScore = isUSLeague ? homeScore : awayScore;

            // Get previous scores for change detection
            const prevScores = previousScores.get(eventSlug) || { left: '0', right: '0' };
            const leftChanged = prevScores.left !== leftScore && prevScores.left !== '0';
            const rightChanged = prevScores.right !== rightScore && prevScores.right !== '0';

            // Store current scores for next comparison
            previousScores.set(eventSlug, { left: leftScore, right: rightScore });

            // Update live indicator
            const liveIndicator = gamePanel.querySelector('.live-indicator');
            if (liveIndicator) {
                if (isLive) {
                    liveIndicator.innerHTML = '<span class="live-pulse text-red-500 font-bold text-xs">● LIVE</span>';
                } else if (gameData.ended) {
                    liveIndicator.innerHTML = '<span class="text-gray-400 text-xs">FINAL</span>';
                } else {
                    liveIndicator.innerHTML = '<span class="text-gray-500 text-xs">UPCOMING</span>';
                }
            }

            // Update team names (prefer stored full names over Sports WS abbreviations)
            const storedTeams = eventGameData.get(eventSlug);
            const leftTeamEl = gamePanel.querySelector('.left-team');
            const rightTeamEl = gamePanel.querySelector('.right-team');

            if (storedTeams) {
                const leftTeamName = isUSLeague ? storedTeams.awayTeam : storedTeams.homeTeam;
                const rightTeamName = isUSLeague ? storedTeams.homeTeam : storedTeams.awayTeam;

                if (leftTeamEl && leftTeamName) {
                    leftTeamEl.textContent = leftTeamName;
                    leftTeamEl.title = leftTeamName;
                }
                if (rightTeamEl && rightTeamName) {
                    rightTeamEl.textContent = rightTeamName;
                    rightTeamEl.title = rightTeamName;
                }
            }

            // Update scores with flash animation on change
            const leftScoreEl = gamePanel.querySelector('.left-score');
            const rightScoreEl = gamePanel.querySelector('.right-score');

            if (leftScoreEl) {
                leftScoreEl.textContent = leftScore;
                if (leftChanged) {
                    triggerScoreFlash(leftScoreEl, parseInt(leftScore) - parseInt(prevScores.left));
                }
            }
            if (rightScoreEl) {
                rightScoreEl.textContent = rightScore;
                if (rightChanged) {
                    triggerScoreFlash(rightScoreEl, parseInt(rightScore) - parseInt(prevScores.right));
                }
            }

            // Update period/time
            const periodEl = gamePanel.querySelector('.game-period');
            if (periodEl) {
                let periodText = period;
                if (elapsed) periodText += ` ${elapsed}`;
                periodEl.textContent = periodText;
            }

            // Update possession indicator (for NFL/CFB)
            const leftPoss = gamePanel.querySelector('.left-possession');
            const rightPoss = gamePanel.querySelector('.right-possession');
            if (leftPoss && rightPoss && possession) {
                // Possession is typically team abbreviation like "lac", "buf"
                const possUpper = possession.toUpperCase();
                const homeTeamUpper = (gameData.homeTeam || '').toUpperCase();
                const awayTeamUpper = (gameData.awayTeam || '').toUpperCase();

                const isHomePoss = homeTeamUpper.startsWith(possUpper) ||
                                   homeTeamUpper.includes(possUpper);
                const isAwayPoss = awayTeamUpper.startsWith(possUpper) ||
                                   awayTeamUpper.includes(possUpper);

                // For US leagues: left=away, right=home
                // For others: left=home, right=away
                const isLeftPoss = isUSLeague ? isAwayPoss : isHomePoss;
                const isRightPoss = isUSLeague ? isHomePoss : isAwayPoss;

                leftPoss.classList.toggle('opacity-100', isLeftPoss);
                leftPoss.classList.toggle('opacity-0', !isLeftPoss);
                rightPoss.classList.toggle('opacity-100', isRightPoss);
                rightPoss.classList.toggle('opacity-0', !isRightPoss);
            }

            // Show the game panel if it was hidden
            gamePanel.classList.remove('hidden');
        }

        // Trigger score flash animation and show delta
        function triggerScoreFlash(scoreEl, delta) {
            // Add flash animation
            scoreEl.classList.remove('score-flash');
            // Force reflow to restart animation
            void scoreEl.offsetWidth;
            scoreEl.classList.add('score-flash');

            // Show delta indicator if positive
            if (delta > 0) {
                // Remove existing delta if any
                const existingDelta = scoreEl.parentElement.querySelector('.score-delta');
                if (existingDelta) existingDelta.remove();

                const deltaEl = document.createElement('span');
                deltaEl.className = 'score-delta';
                deltaEl.textContent = `+${delta}`;
                scoreEl.parentElement.style.position = 'relative';
                scoreEl.parentElement.appendChild(deltaEl);

                // Remove delta after animation
                setTimeout(() => deltaEl.remove(), 1500);
            }

            // Remove flash class after animation
            setTimeout(() => scoreEl.classList.remove('score-flash'), 600);
        }

        function parseScore(score, eventSlug) {
            if (!score) return ['0', '0'];

            // Esports format: "000-000|2-1|Bo3" - series score is middle part
            if (score.includes('|')) {
                const segments = score.split('|');
                // Find the segment that looks like a series score (e.g., "2-1")
                for (const seg of segments) {
                    if (seg.match(/^\d+-\d+$/) && !seg.match(/^0+-0+$/)) {
                        const parts = seg.split('-');
                        return [parts[0].trim(), parts[1].trim()];
                    }
                }
                // Fallback to second segment if exists
                if (segments.length >= 2) {
                    const parts = segments[1].split('-');
                    if (parts.length === 2) {
                        return [parts[0].trim(), parts[1].trim()];
                    }
                }
            }

            // Standard format: "homeScore-awayScore" (e.g., "102-98")
            const parts = score.split('-');
            if (parts.length === 2) {
                return [parts[0].trim(), parts[1].trim()];
            }

            return ['0', '0'];
        }

        function getTeamsFromSlug(eventSlug) {
            const parts = eventSlug.toLowerCase().split('-');
            if (parts.length < 3) return { home: '???', away: '???' };

            const league = parts[0];
            const team1 = parts[1].toUpperCase();
            const team2 = parts[2].toUpperCase();

            if (US_LEAGUES.includes(league)) {
                return { home: team2, away: team1 };
            }
            return { home: team1, away: team2 };
        }

        // Parse team names from event title
        // e.g., "Philadelphia 76ers vs Phoenix Suns" → { team1: "Philadelphia 76ers", team2: "Phoenix Suns" }
        // e.g., "FK Bodø/Glimt vs. Manchester City FC" → { team1: "FK Bodø/Glimt", team2: "Manchester City FC" }
        function parseTeamsFromTitle(title) {
            if (!title) return null;

            // Try different separators
            const separators = [' vs. ', ' vs ', ' v. ', ' v ', ' - '];
            for (const sep of separators) {
                const idx = title.toLowerCase().indexOf(sep.toLowerCase());
                if (idx > 0) {
                    const team1 = title.substring(0, idx).trim();
                    const team2 = title.substring(idx + sep.length).trim();
                    // Remove common suffixes like "(BO3)", "- ESL One...", etc.
                    const cleanTeam2 = team2.split(/\s*[\(\-\|]/)[0].trim();
                    if (team1 && cleanTeam2) {
                        return { team1, team2: cleanTeam2 };
                    }
                }
            }
            return null;
        }

        // Determine home/away from title based on league convention
        function getTeamsFromTitle(eventSlug, title) {
            const parsed = parseTeamsFromTitle(title);
            if (!parsed) return null;

            const parts = eventSlug.toLowerCase().split('-');
            const league = parts[0] || '';

            // US sports: title is "Away @ Home" or "Away vs Home" (away first)
            // Soccer/Esports: title is "Home vs Away" (home first)
            if (US_LEAGUES.includes(league)) {
                return { home: parsed.team2, away: parsed.team1 };
            }
            return { home: parsed.team1, away: parsed.team2 };
        }

        // ==================== Trade WebSocket ====================

        function toggleConnection() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                manualDisconnect = true;
                disconnect();
            } else {
                manualDisconnect = false;
                connect();
            }
        }

        function connect() {
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            setStatus('connecting', 'Connecting...');

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                setStatus('connected', 'Connected');
                document.getElementById('connectBtn').textContent = 'Disconnect';
                document.getElementById('connectBtn').classList.remove('bg-blue-600', 'hover:bg-blue-700');
                document.getElementById('connectBtn').classList.add('bg-red-600', 'hover:bg-red-700');
                document.getElementById('addEventSection').classList.remove('hidden');

                // Connect to sports WebSocket
                connectSportsWs();

                // Re-subscribe to saved events
                resubscribeAll();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };

            ws.onclose = () => {
                setStatus('disconnected', 'Disconnected');
                document.getElementById('connectBtn').textContent = 'Connect';
                document.getElementById('connectBtn').classList.remove('bg-red-600', 'hover:bg-red-700');
                document.getElementById('connectBtn').classList.add('bg-blue-600', 'hover:bg-blue-700');
                document.getElementById('addEventSection').classList.add('hidden');

                // Auto-reconnect unless manually disconnected
                if (!manualDisconnect) {
                    setStatus('disconnected', 'Reconnecting...');
                    reconnectTimer = setTimeout(() => {
                        console.log('Auto-reconnecting...');
                        connect();
                    }, RECONNECT_DELAY);
                }
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                setStatus('error', 'Error');
            };
        }

        function disconnect() {
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'subscribed':
                    const existing = subscriptions.get(data.event);
                    const savedSubs = loadSavedSubscriptions();
                    const savedItem = savedSubs.find(s => s.slug === data.event);
                    const allMarkets = existing?.allMarkets || savedItem?.allMarkets || false;

                    subscriptions.set(data.event, {
                        title: data.title || data.event,
                        trades: existing?.trades || [],
                        buys: existing?.buys || 0,
                        sells: existing?.sells || 0,
                        allMarkets: allMarkets
                    });
                    saveSubscriptions();
                    renderPanels();

                    // Try to match with existing game states
                    gameStates.forEach((gameData, gameId) => {
                        if (matchEventToGame(data.event, gameData)) {
                            eventToGameId.set(data.event, gameId);
                            setTimeout(() => updateGameStateUI(data.event, gameData), 100);
                        }
                    });
                    break;

                case 'unsubscribed':
                    subscriptions.delete(data.event);
                    eventToGameId.delete(data.event);
                    saveSubscriptions();
                    renderPanels();
                    break;

                case 'subscriptions':
                    if (data.events) {
                        data.events.forEach(event => {
                            if (!subscriptions.has(event)) {
                                subscriptions.set(event, { title: event, trades: [], buys: 0, sells: 0 });
                            }
                        });
                    }
                    renderPanels();
                    break;

                case 'error':
                    console.error(data.message);
                    alert('Error: ' + data.message);
                    break;

                default:
                    if (data.trader && data.side) {
                        addTrade(data);
                    }
            }
        }

        function subscribeEvent() {
            const input = document.getElementById('eventSlug');
            const allMarketsToggle = document.getElementById('allMarketsToggle');
            const eventSlug = input.value.trim();
            const allMarkets = allMarketsToggle.checked;

            if (!eventSlug) {
                alert('Please enter an event slug');
                return;
            }
            if (subscriptions.has(eventSlug)) {
                alert('Already subscribed to this event');
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                console.log('Subscribing to:', eventSlug, 'allMarkets:', allMarkets);
                ws.send(JSON.stringify({ action: 'subscribe', event: eventSlug, allMarkets: allMarkets }));
                input.value = '';
            } else {
                alert('WebSocket not connected. Please reconnect.');
            }
        }

        function unsubscribeEvent(eventSlug) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'unsubscribe', event: eventSlug }));
            }
        }

        function setStatus(state, text) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('status');
            statusText.textContent = text;

            const colors = {
                connected: ['bg-green-500', 'text-green-400'],
                connecting: ['bg-yellow-500 animate-pulse', 'text-yellow-400'],
                disconnected: ['bg-gray-500', 'text-gray-400'],
                error: ['bg-red-500', 'text-red-400']
            };

            statusDot.className = `w-2.5 h-2.5 rounded-full ${colors[state][0]}`;
            statusText.className = `text-sm ${colors[state][1]}`;
        }

        function renderPanels() {
            const container = document.getElementById('eventPanels');
            const placeholder = document.getElementById('noEventsPlaceholder');

            if (subscriptions.size === 0) {
                container.innerHTML = '';
                container.appendChild(placeholder);
                placeholder.classList.remove('hidden');
                return;
            }

            container.innerHTML = '';

            subscriptions.forEach((eventData, slug) => {
                const panel = createEventPanel(slug, eventData);
                container.appendChild(panel);
            });
        }

        function createEventPanel(slug, eventData) {
            const panel = document.createElement('div');
            panel.id = `panel-${slug}`;
            panel.className = 'event-panel bg-gray-800 rounded-lg overflow-hidden flex flex-col';

            const gameId = eventToGameId.get(slug);
            const gameData = gameId ? gameStates.get(gameId) : null;
            const storedTeams = eventGameData.get(slug);
            const hasGameData = !!gameData;

            // Use full team names from Sports WS, fallback to slug
            const teams = storedTeams ? {
                home: storedTeams.homeTeam,
                away: storedTeams.awayTeam
            } : getTeamsFromSlug(slug);

            // Determine display order based on league
            // US sports: Away @ Home (away on left, home on right)
            // Soccer/Esports: Home vs Away (home on left, away on right)
            const parts = slug.toLowerCase().split('-');
            const league = parts[0] || '';
            const isUSLeague = US_LEAGUES.includes(league);
            const leftTeam = isUSLeague ? teams.away : teams.home;
            const rightTeam = isUSLeague ? teams.home : teams.away;

            panel.innerHTML = `
                <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-sm truncate" title="${eventData.title}">${eventData.title}</div>
                        <div class="text-gray-500 text-xs truncate">${slug}</div>
                    </div>
                    <button onclick="unsubscribeEvent('${slug}')"
                            class="ml-2 text-gray-500 hover:text-red-400 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <!-- Game State Panel -->
                <div id="game-${slug}" class="score-box p-3 border-b border-gray-700 ${hasGameData ? '' : 'hidden'}">
                    <div class="flex items-center justify-between mb-2">
                        <div class="live-indicator">
                            <span class="text-gray-500 text-xs">UPCOMING</span>
                        </div>
                        <div class="game-period text-gray-400 text-xs"></div>
                    </div>
                    <div class="flex items-center justify-center gap-4">
                        <div class="text-center flex-1">
                            <div class="flex items-center justify-center gap-1">
                                <span class="left-possession text-yellow-400 text-xs opacity-0">●</span>
                                <span class="left-team text-gray-300 font-medium text-sm truncate max-w-[120px]" title="${leftTeam}">${leftTeam}</span>
                            </div>
                            <div class="left-score text-3xl font-bold text-white">0</div>
                        </div>
                        <div class="text-gray-600 text-xl">-</div>
                        <div class="text-center flex-1">
                            <div class="flex items-center justify-center gap-1">
                                <span class="right-team text-gray-300 font-medium text-sm truncate max-w-[120px]" title="${rightTeam}">${rightTeam}</span>
                                <span class="right-possession text-yellow-400 text-xs opacity-0">●</span>
                            </div>
                            <div class="right-score text-3xl font-bold text-white">0</div>
                        </div>
                    </div>
                    <input type="hidden" class="is-us-league" value="${isUSLeague}">
                </div>

                <!-- Stats Row -->
                <div class="grid grid-cols-3 gap-2 p-3 border-b border-gray-700 bg-gray-800/50">
                    <div class="text-center">
                        <div id="total-${slug}" class="text-lg font-bold text-blue-400">${eventData.buys + eventData.sells}</div>
                        <div class="text-gray-500 text-xs">Total</div>
                    </div>
                    <div class="text-center">
                        <div id="buys-${slug}" class="text-lg font-bold text-green-400">${eventData.buys}</div>
                        <div class="text-gray-500 text-xs">Buys</div>
                    </div>
                    <div class="text-center">
                        <div id="sells-${slug}" class="text-lg font-bold text-red-400">${eventData.sells}</div>
                        <div class="text-gray-500 text-xs">Sells</div>
                    </div>
                </div>

                <!-- Trades List -->
                <div id="trades-${slug}" class="trade-list flex-1">
                    ${eventData.trades.length === 0 ?
                        '<div class="p-6 text-center text-gray-600 text-sm">Waiting for trades...</div>' :
                        eventData.trades.map(t => createTradeHTML(t)).join('')}
                </div>
            `;

            // If we have game data, update the UI
            if (gameData) {
                setTimeout(() => updateGameStateUI(slug, gameData), 50);
            }

            return panel;
        }

        function formatTimeUTC8(timestamp) {
            let date;
            if (timestamp) {
                const ts = timestamp < 10000000000 ? timestamp * 1000 : timestamp;
                date = new Date(ts);
            } else {
                date = new Date();
            }
            return date.toLocaleTimeString('en-US', {
                timeZone: 'Asia/Shanghai',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function createTradeHTML(trade) {
            const isBuy = trade.side === 'BUY';
            const sideColor = isBuy ? 'text-green-400' : 'text-red-400';
            const time = formatTimeUTC8(trade.timestamp);

            const traderName = trade.trader || 'Anonymous';
            const traderLink = trade.proxyWallet ?
                `https://polymarket.com/profile/${trade.proxyWallet}?tab=activity` : '#';

            return `
                <div class="trade-enter flex items-center justify-between px-3 py-2 border-b border-gray-700/50 hover:bg-gray-700/30 text-sm">
                    <div class="flex items-center gap-2 min-w-0 flex-1">
                        <span class="text-gray-500 text-xs w-16 flex-shrink-0">${time}</span>
                        <a href="${traderLink}" target="_blank" rel="noopener"
                           class="text-yellow-400 hover:text-yellow-300 hover:underline font-medium truncate max-w-[100px]"
                           title="${traderName}">
                            ${traderName}
                        </a>
                        <span class="${sideColor} font-bold w-10 flex-shrink-0">${trade.side}</span>
                        <span class="text-gray-300 truncate">${trade.outcome}</span>
                    </div>
                    <div class="flex items-center gap-1 flex-shrink-0 ml-2">
                        <span class="text-blue-400 font-medium">$${parseFloat(trade.size).toFixed(2)}</span>
                        <span class="text-gray-500">@</span>
                        <span class="text-purple-400">$${parseFloat(trade.price).toFixed(2)}</span>
                    </div>
                </div>
            `;
        }

        function addTrade(trade) {
            const eventSlug = trade.eventSlug;
            if (!eventSlug || !subscriptions.has(eventSlug)) return;

            const eventData = subscriptions.get(eventSlug);
            const isBuy = trade.side === 'BUY';

            if (isBuy) eventData.buys++;
            else eventData.sells++;

            eventData.trades.unshift(trade);
            if (eventData.trades.length > 100) eventData.trades.pop();

            const totalEl = document.getElementById(`total-${eventSlug}`);
            const buysEl = document.getElementById(`buys-${eventSlug}`);
            const sellsEl = document.getElementById(`sells-${eventSlug}`);

            if (totalEl) totalEl.textContent = eventData.buys + eventData.sells;
            if (buysEl) buysEl.textContent = eventData.buys;
            if (sellsEl) sellsEl.textContent = eventData.sells;

            const tradesEl = document.getElementById(`trades-${eventSlug}`);
            if (tradesEl) {
                const waiting = tradesEl.querySelector('.text-gray-600');
                if (waiting) waiting.remove();

                const tradeEl = document.createElement('div');
                tradeEl.innerHTML = createTradeHTML(trade);
                tradesEl.insertBefore(tradeEl.firstElementChild, tradesEl.firstChild);

                while (tradesEl.children.length > 100) {
                    tradesEl.removeChild(tradesEl.lastChild);
                }
            }
        }

        // Handle Enter key
        document.getElementById('eventSlug').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') subscribeEvent();
        });

        // Auto-connect on page load if there are saved subscriptions
        window.addEventListener('load', function() {
            const saved = loadSavedSubscriptions();
            if (saved.length > 0) {
                console.log('Found saved subscriptions, auto-connecting...');
                connect();
            }
        });

        // Reconnect when tab becomes visible
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                // Tab became visible, check connections
                if (ws && ws.readyState !== WebSocket.OPEN && !manualDisconnect) {
                    console.log('Tab visible, reconnecting trade WS...');
                    connect();
                }
                if (sportsWs && sportsWs.readyState !== WebSocket.OPEN) {
                    console.log('Tab visible, reconnecting sports WS...');
                    connectSportsWs();
                }
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            manualDisconnect = true; // Prevent reconnect attempts
            if (reconnectTimer) clearTimeout(reconnectTimer);
            if (sportsReconnectTimer) clearTimeout(sportsReconnectTimer);
            if (ws) {
                ws.close();
                ws = null;
            }
            if (sportsWs) {
                sportsWs.close();
                sportsWs = null;
            }
        });
    </script>
</body>
</html>
