<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Live Trades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .trade-enter {
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .event-panel {
            min-height: 400px;
            max-height: 600px;
        }
        .trade-list {
            max-height: 450px;
            overflow-y: auto;
        }
        .trade-list::-webkit-scrollbar {
            width: 6px;
        }
        .trade-list::-webkit-scrollbar-track {
            background: #1f2937;
        }
        .trade-list::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">Polymarket Live Trades</h1>
                <p class="text-gray-400 text-sm">Pro Trader View - Multi-Event Monitoring</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-gray-500"></div>
                    <span id="status" class="text-gray-400 text-sm">Not connected</span>
                </div>
                <button onclick="toggleConnection()" id="connectBtn"
                        class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 rounded text-sm font-medium transition-colors">
                    Connect
                </button>
            </div>
        </div>

        <!-- Add Event Bar -->
        <div id="addEventSection" class="hidden mb-6">
            <div class="flex gap-2">
                <input type="text" id="eventSlug"
                       placeholder="Enter event slug (e.g., nba-lal-por-2026-01-17)"
                       class="flex-1 px-4 py-2 rounded bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 text-sm">
                <button onclick="subscribeEvent()"
                        class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded text-sm font-medium transition-colors">
                    Add Event
                </button>
            </div>
        </div>

        <!-- Event Panels Grid -->
        <div id="eventPanels" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
            <!-- Placeholder when no events -->
            <div id="noEventsPlaceholder" class="col-span-full bg-gray-800 rounded-lg p-12 text-center">
                <div class="text-gray-500 text-lg mb-2">No events subscribed</div>
                <div class="text-gray-600 text-sm">Connect and add events to start monitoring trades</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-6 text-center text-gray-600 text-xs">
            Powered by Polymarket RTDS WebSocket
        </div>
    </div>

    <script>
        let ws = null;
        let subscriptions = new Map(); // eventSlug -> { title, trades: [], buys: 0, sells: 0 }

        function toggleConnection() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            setStatus('connecting', 'Connecting...');

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                setStatus('connected', 'Connected');
                document.getElementById('connectBtn').textContent = 'Disconnect';
                document.getElementById('connectBtn').classList.remove('bg-blue-600', 'hover:bg-blue-700');
                document.getElementById('connectBtn').classList.add('bg-red-600', 'hover:bg-red-700');
                document.getElementById('addEventSection').classList.remove('hidden');
                ws.send(JSON.stringify({ action: 'list' }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };

            ws.onclose = () => {
                setStatus('disconnected', 'Disconnected');
                document.getElementById('connectBtn').textContent = 'Connect';
                document.getElementById('connectBtn').classList.remove('bg-red-600', 'hover:bg-red-700');
                document.getElementById('connectBtn').classList.add('bg-blue-600', 'hover:bg-blue-700');
                document.getElementById('addEventSection').classList.add('hidden');
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                setStatus('error', 'Error');
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'subscribed':
                    subscriptions.set(data.event, {
                        title: data.title || data.event,
                        trades: [],
                        buys: 0,
                        sells: 0
                    });
                    renderPanels();
                    break;

                case 'unsubscribed':
                    subscriptions.delete(data.event);
                    renderPanels();
                    break;

                case 'subscriptions':
                    if (data.events) {
                        data.events.forEach(event => {
                            if (!subscriptions.has(event)) {
                                subscriptions.set(event, { title: event, trades: [], buys: 0, sells: 0 });
                            }
                        });
                    }
                    renderPanels();
                    break;

                case 'error':
                    console.error(data.message);
                    break;

                default:
                    if (data.trader && data.side) {
                        addTrade(data);
                    }
            }
        }

        function subscribeEvent() {
            const input = document.getElementById('eventSlug');
            const eventSlug = input.value.trim();

            if (!eventSlug) return;
            if (subscriptions.has(eventSlug)) return;

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'subscribe', event: eventSlug }));
                input.value = '';
            }
        }

        function unsubscribeEvent(eventSlug) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'unsubscribe', event: eventSlug }));
            }
        }

        function setStatus(state, text) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('status');
            statusText.textContent = text;

            const colors = {
                connected: ['bg-green-500', 'text-green-400'],
                connecting: ['bg-yellow-500 animate-pulse', 'text-yellow-400'],
                disconnected: ['bg-gray-500', 'text-gray-400'],
                error: ['bg-red-500', 'text-red-400']
            };

            statusDot.className = `w-2.5 h-2.5 rounded-full ${colors[state][0]}`;
            statusText.className = `text-sm ${colors[state][1]}`;
        }

        function renderPanels() {
            const container = document.getElementById('eventPanels');
            const placeholder = document.getElementById('noEventsPlaceholder');

            if (subscriptions.size === 0) {
                container.innerHTML = '';
                container.appendChild(placeholder);
                placeholder.classList.remove('hidden');
                return;
            }

            container.innerHTML = '';

            subscriptions.forEach((eventData, slug) => {
                const panel = createEventPanel(slug, eventData);
                container.appendChild(panel);
            });
        }

        function createEventPanel(slug, eventData) {
            const panel = document.createElement('div');
            panel.id = `panel-${slug}`;
            panel.className = 'event-panel bg-gray-800 rounded-lg overflow-hidden flex flex-col';

            panel.innerHTML = `
                <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-sm truncate" title="${eventData.title}">${eventData.title}</div>
                        <div class="text-gray-500 text-xs truncate">${slug}</div>
                    </div>
                    <button onclick="unsubscribeEvent('${slug}')"
                            class="ml-2 text-gray-500 hover:text-red-400 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="grid grid-cols-3 gap-2 p-3 border-b border-gray-700 bg-gray-800/50">
                    <div class="text-center">
                        <div id="total-${slug}" class="text-lg font-bold text-blue-400">${eventData.buys + eventData.sells}</div>
                        <div class="text-gray-500 text-xs">Total</div>
                    </div>
                    <div class="text-center">
                        <div id="buys-${slug}" class="text-lg font-bold text-green-400">${eventData.buys}</div>
                        <div class="text-gray-500 text-xs">Buys</div>
                    </div>
                    <div class="text-center">
                        <div id="sells-${slug}" class="text-lg font-bold text-red-400">${eventData.sells}</div>
                        <div class="text-gray-500 text-xs">Sells</div>
                    </div>
                </div>
                <div id="trades-${slug}" class="trade-list flex-1">
                    ${eventData.trades.length === 0 ?
                        '<div class="p-6 text-center text-gray-600 text-sm">Waiting for trades...</div>' :
                        eventData.trades.map(t => createTradeHTML(t)).join('')}
                </div>
            `;

            return panel;
        }

        function formatTimeUTC8(timestamp) {
            let date;
            if (timestamp) {
                // RTDS timestamps are in seconds, JavaScript expects milliseconds
                // If timestamp is 10 digits (seconds), multiply by 1000
                const ts = timestamp < 10000000000 ? timestamp * 1000 : timestamp;
                date = new Date(ts);
            } else {
                date = new Date();
            }
            return date.toLocaleTimeString('en-US', {
                timeZone: 'Asia/Shanghai',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function createTradeHTML(trade) {
            const isBuy = trade.side === 'BUY';
            const sideColor = isBuy ? 'text-green-400' : 'text-red-400';
            const time = formatTimeUTC8(trade.timestamp);

            // Build trader link
            const traderName = trade.trader || 'Anonymous';
            const traderLink = trade.proxyWallet ?
                `https://polymarket.com/profile/${trade.proxyWallet}?tab=activity` : '#';

            return `
                <div class="trade-enter flex items-center justify-between px-3 py-2 border-b border-gray-700/50 hover:bg-gray-700/30 text-sm">
                    <div class="flex items-center gap-2 min-w-0 flex-1">
                        <span class="text-gray-500 text-xs w-16 flex-shrink-0">${time}</span>
                        <a href="${traderLink}" target="_blank" rel="noopener"
                           class="text-yellow-400 hover:text-yellow-300 hover:underline font-medium truncate max-w-[100px]"
                           title="${traderName}">
                            ${traderName}
                        </a>
                        <span class="${sideColor} font-bold w-10 flex-shrink-0">${trade.side}</span>
                        <span class="text-gray-300 truncate">${trade.outcome}</span>
                    </div>
                    <div class="flex items-center gap-1 flex-shrink-0 ml-2">
                        <span class="text-blue-400 font-medium">$${parseFloat(trade.size).toFixed(2)}</span>
                        <span class="text-gray-500">@</span>
                        <span class="text-purple-400">$${parseFloat(trade.price).toFixed(2)}</span>
                    </div>
                </div>
            `;
        }

        function addTrade(trade) {
            const eventSlug = trade.eventSlug;
            if (!eventSlug || !subscriptions.has(eventSlug)) return;

            const eventData = subscriptions.get(eventSlug);
            const isBuy = trade.side === 'BUY';

            // Update stats
            if (isBuy) eventData.buys++;
            else eventData.sells++;

            // Add trade to beginning
            eventData.trades.unshift(trade);
            if (eventData.trades.length > 100) eventData.trades.pop();

            // Update panel stats
            const totalEl = document.getElementById(`total-${eventSlug}`);
            const buysEl = document.getElementById(`buys-${eventSlug}`);
            const sellsEl = document.getElementById(`sells-${eventSlug}`);

            if (totalEl) totalEl.textContent = eventData.buys + eventData.sells;
            if (buysEl) buysEl.textContent = eventData.buys;
            if (sellsEl) sellsEl.textContent = eventData.sells;

            // Add trade to list
            const tradesEl = document.getElementById(`trades-${eventSlug}`);
            if (tradesEl) {
                // Remove "waiting" message if present
                const waiting = tradesEl.querySelector('.text-gray-600');
                if (waiting) waiting.remove();

                const tradeEl = document.createElement('div');
                tradeEl.innerHTML = createTradeHTML(trade);
                tradesEl.insertBefore(tradeEl.firstElementChild, tradesEl.firstChild);

                // Limit displayed trades
                while (tradesEl.children.length > 100) {
                    tradesEl.removeChild(tradesEl.lastChild);
                }
            }
        }

        // Handle Enter key
        document.getElementById('eventSlug').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') subscribeEvent();
        });
    </script>
</body>
</html>
